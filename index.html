<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Cranium | Skull Blox</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #08090f;
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .liquid-glass {
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mesh-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.2;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Background Blobs -->
    <div class="mesh-blob bg-blue-600 w-[60vw] h-[60vw] -top-[10%] -left-[10%]"></div>
    <div class="mesh-blob bg-purple-600 w-[50vw] h-[50vw] -bottom-[10%] -right-[10%]"></div>

    <div id="root" class="min-h-screen pb-32">
        <!-- Header -->
        <header class="max-w-6xl mx-auto pt-20 pb-12 px-6 text-center animate-fade-in">
            <div class="inline-flex items-center gap-3 backdrop-blur-xl bg-white/5 px-6 py-2 rounded-2xl border border-white/10 mb-8">
                <div class="w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></div>
                <span class="text-[10px] font-black uppercase tracking-[0.4em]">Project Cranium v2.0</span>
            </div>
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter mb-6 bg-gradient-to-b from-white to-white/40 bg-clip-text text-transparent">
                SKULL <span class="text-white">BLOX</span>
            </h1>
            <p class="text-lg text-white/50 font-bold uppercase tracking-widest max-w-xl mx-auto">
                Analyzing Avatar Hardware... 100% Complete
            </p>
        </header>

        <!-- Navigation Dock -->
        <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
            <div class="backdrop-blur-3xl bg-black/40 px-3 py-3 rounded-[2rem] border border-white/10 shadow-2xl flex items-center gap-2">
                <button onclick="switchTab('explore')" id="nav-explore" class="nav-btn bg-white text-black px-6 py-3 rounded-2xl font-black transition-all flex items-center gap-2 text-xs uppercase">
                    <i data-lucide="server" class="w-4 h-4"></i> Skull Loadout
                </button>
                <button onclick="switchTab('lingo')" id="nav-lingo" class="nav-btn text-white/60 hover:text-white px-6 py-3 rounded-2xl font-black transition-all flex items-center gap-2 text-xs uppercase">
                    <i data-lucide="code-2" class="w-4 h-4"></i> Lingo Lab
                </button>
                <button onclick="switchTab('lore')" id="nav-lore" class="nav-btn text-white/60 hover:text-white px-6 py-3 rounded-2xl font-black transition-all flex items-center gap-2 text-xs uppercase">
                    <i data-lucide="box" class="w-4 h-4"></i> Avatar Lore
                </button>
            </div>
        </nav>

        <!-- Content Area -->
        <main id="content" class="max-w-6xl mx-auto px-6 relative z-10"></main>
    </div>

    <script>
        // Data
        const skullParts = [
            { id: 'cranium', name: 'The Cranium', nickname: 'The Helmet Mod', color: 'from-blue-500 to-cyan-400', icon: 'shield', description: 'The ultimate armor! This big dome of bone acts like a heavy-duty helmet to protect your brain from taking damage.' },
            { id: 'mandible', name: 'Mandible', nickname: 'The Chomper', color: 'from-purple-500 to-indigo-400', icon: 'message-square', description: 'The only moving part in your skull loadout! It lets you chat with friends, eat pizza, and express emotions.' },
            { id: 'maxilla', name: 'Maxilla', nickname: 'Upper Jaw HQ', color: 'from-emerald-500 to-teal-400', icon: 'arrow-up-square', description: 'This bone holds your top row of teeth and builds the center of your face. It’s the foundation of your facial mesh!' },
            { id: 'zygomatic', name: 'Zygomatic', nickname: 'The Cheek Blocks', color: 'from-amber-400 to-orange-400', icon: 'smile', description: 'The cheekbones! They give your face its structure and make your cheeks pop out when you equip a happy emote.' },
            { id: 'orbits', name: 'The Orbits', nickname: 'Eye Sockets', color: 'from-rose-500 to-pink-400', icon: 'eye', description: 'Deep, safe caves built into your skull where your eyeballs sit securely so you can see the whole game map.' }
        ];

        const lingoCodes = [
            { type: 'Prefix', code: 'Cephal-', meaning: 'Head', example: 'Cephalic Armor', color: 'text-blue-300 bg-blue-500/20' },
            { type: 'Prefix', code: 'Crani-', meaning: 'Skull', example: 'Craniotomy', color: 'text-purple-300 bg-purple-500/20' },
            { type: 'Prefix', code: 'Rhin-', meaning: 'Nose', example: 'Rhinoplasty', color: 'text-emerald-300 bg-emerald-500/20' },
            { type: 'Suffix', code: '-logy', meaning: 'Study of', example: 'Zoology', color: 'text-amber-300 bg-amber-500/20' },
            { type: 'Suffix', code: '-plasty', meaning: 'To Repair', example: 'Rhinoplasty', color: 'text-rose-300 bg-rose-500/20' },
            { type: 'Suffix', code: '-otomy', meaning: 'To Cut', example: 'Craniotomy', color: 'text-indigo-300 bg-indigo-500/20' }
        ];

        let currentTab = 'explore';
        let selectedPartIndex = 0;

        function switchTab(tab) {
            currentTab = tab;
            render();
            
            // Update Nav UI
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-black');
                btn.classList.add('text-white/60');
            });
            const activeBtn = document.getElementById(`nav-${tab}`);
            activeBtn.classList.remove('text-white/60');
            activeBtn.classList.add('bg-white', 'text-black');
        }

        function selectPart(index) {
            selectedPartIndex = index;
            render();
        }

        function render() {
            const container = document.getElementById('content');
            container.innerHTML = '';
            container.className = "max-w-6xl mx-auto px-6 animate-fade-in";

            if (currentTab === 'explore') {
                const selected = skullParts[selectedPartIndex];
                container.innerHTML = `
                    <div class="grid lg:grid-cols-12 gap-6 items-start">
                        <div class="lg:col-span-5 space-y-4">
                            ${skullParts.map((part, i) => `
                                <button onclick="selectPart(${i})" class="w-full flex items-center justify-between p-4 rounded-[1.8rem] transition-all duration-300 border ${i === selectedPartIndex ? 'liquid-glass bg-white/10 border-white/40 shadow-xl' : 'bg-black/20 border-white/5 hover:bg-white/5'}">
                                    <div class="flex items-center gap-4 text-left">
                                        <div class="p-3 rounded-2xl bg-gradient-to-br ${part.color} shadow-lg"><i data-lucide="${part.icon}"></i></div>
                                        <div>
                                            <h3 class="font-black text-lg ${i === selectedPartIndex ? 'text-white' : 'text-white/70'}">${part.name}</h3>
                                            <p class="text-[10px] text-white/50 font-black uppercase tracking-widest">${part.nickname}</p>
                                        </div>
                                    </div>
                                </button>
                            `).join('')}
                        </div>
                        <div class="lg:col-span-7">
                            <div class="liquid-glass p-10 rounded-[2.5rem] relative overflow-hidden min-h-[450px] flex flex-col justify-center">
                                <div class="absolute -top-32 -right-32 w-80 h-80 bg-gradient-to-br ${selected.color} opacity-20 blur-[100px] rounded-full"></div>
                                <div class="inline-flex p-6 rounded-[2rem] bg-gradient-to-br ${selected.color} shadow-xl mb-8 w-fit">
                                    <i data-lucide="${selected.icon}" class="w-16 h-16 text-white"></i>
                                </div>
                                <h2 class="text-5xl font-black mb-4">${selected.name}</h2>
                                <p class="text-2xl text-white/80 leading-snug mb-8">${selected.description}</p>
                                <div class="flex items-center gap-2 text-white/30 text-[10px] font-black uppercase tracking-widest">
                                    <i data-lucide="terminal" class="w-4 h-4"></i> Node Secure
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'lingo') {
                container.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${lingoCodes.map(item => `
                            <div class="liquid-glass p-8 rounded-[2.5rem] flex flex-col h-full border-white/10">
                                <div class="self-start px-3 py-1 rounded-md mb-6 font-black text-[10px] uppercase tracking-widest ${item.color}">${item.type} Unlocked</div>
                                <h3 class="text-4xl font-black mb-2">${item.code}</h3>
                                <p class="text-white/50 font-bold uppercase text-xs tracking-widest mb-6">Means: <span class="text-white">${item.meaning}</span></p>
                                <div class="mt-auto bg-black/20 p-4 rounded-2xl border border-white/5">
                                    <p class="text-[10px] text-white/40 font-black uppercase mb-1">Server Usage:</p>
                                    <p class="text-lg font-bold text-cyan-400 italic">"${item.example}"</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (currentTab === 'lore') {
                container.innerHTML = `
                    <div class="max-w-4xl mx-auto space-y-6">
                        <div class="liquid-glass p-10 rounded-[2.5rem] flex items-center gap-8">
                            <div class="bg-blue-600 p-6 rounded-3xl"><i data-lucide="shield" class="w-10 h-10"></i></div>
                            <div><h3 class="text-2xl font-black mb-1">Tank Stats</h3><p class="text-white/60">Your skull can support 18,000 lbs—more than two elephants!</p></div>
                        </div>
                        <div class="liquid-glass p-10 rounded-[2.5rem] flex items-center gap-8">
                            <div class="bg-purple-600 p-6 rounded-3xl"><i data-lucide="box" class="w-10 h-10"></i></div>
                            <div><h3 class="text-2xl font-black mb-1">Fusion Level</h3><p class="text-white/60">Spawn with 44 bones, finish with 22. Maximum level reached!</p></div>
                        </div>
                    </div>
                `;
            }
            
            // Re-render icons
            lucide.createIcons();
        }

        // Initialize
        window.onload = render;
    </script>
</body>
</html>
